events {
    worker_connections 1024;
}

http {
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip para respostas JSON e assets do Next.js
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # Cloudflare está na frente: o IP real do visitante chega em CF-Connecting-IP.
    # Nginx repassa como X-Real-IP para o Flask (usado no rate limiting por IP).
    # Para maior segurança: substitua 0.0.0.0/0 pelos CIDR do Cloudflare:
    #   https://www.cloudflare.com/ips/
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 0.0.0.0/0;

    # Log estruturado (JSON) facilita parsers de monitoramento
    log_format json_log escape=json
        '{"time":"$time_iso8601",'
        '"ip":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"duration":$request_time}';

    access_log /var/log/nginx/access.log json_log;
    error_log  /var/log/nginx/error.log warn;

    upstream backend  { server backend:5000;  keepalive 16; }
    upstream frontend { server frontend:3000; keepalive 16; }

    server {
        listen 80;
        server_name _;

        # ── API Flask ─────────────────────────────────────────────────────────
        # A URL pública é /api/*, mas Flask não conhece esse prefixo — ele usa
        # rotas como /auth/login, /alunos/, etc. O trailing slash em proxy_pass
        # faz nginx remover /api/ antes de repassar ao Flask:
        #   GET /api/auth/login  →  GET /auth/login  (Flask)
        location /api/ {
            proxy_pass         http://backend/;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_read_timeout    60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;

            # Uploads de avatar (4 MB + overhead multipart)
            client_max_body_size 8m;
        }

        # ── Assets estáticos Next.js (cache longo, imutáveis por hash) ────────
        location /_next/static/ {
            proxy_pass http://frontend;
            add_header Cache-Control "public, max-age=31536000, immutable";
            proxy_set_header Host $host;
        }

        # ── Next.js (SSR + rotas de página) ──────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # ── Healthcheck interno ────────────────────────────────────────────────
        # Acesso direto ao /health do Flask (sem prefixo /api/) para o Docker
        # healthcheck do nginx não interferir no log de acesso principal.
        location = /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
